services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sacco_app}
      POSTGRES_USER: ${POSTGRES_USER:-sacco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sacco_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sacco} -d ${POSTGRES_DB:-sacco_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    build:
      context: ./backend-java
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sacco_app}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sacco}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sacco_dev_password}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"

volumes:
  postgres_data:
