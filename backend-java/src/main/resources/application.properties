spring.application.name=sacco-backend
server.port=8080

spring.datasource.url=jdbc:h2:mem:sacco_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info

sacco.demo-logins.enabled=${SACCO_DEMO_LOGINS_ENABLED:true}
sacco.auth.rate-limit.max-failures=${SACCO_AUTH_RATE_LIMIT_MAX_FAILURES:6}
sacco.auth.rate-limit.window-seconds=${SACCO_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
