spring.application.name=sacco-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sacco_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sacco}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sacco}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
server.forward-headers-strategy=framework
