spring.application.name=sacco-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sacco_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sacco}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sacco}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
server.forward-headers-strategy=framework

sacco.demo-logins.enabled=${SACCO_DEMO_LOGINS_ENABLED:false}
sacco.auth.rate-limit.max-failures=${SACCO_AUTH_RATE_LIMIT_MAX_FAILURES:6}
sacco.auth.rate-limit.window-seconds=${SACCO_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
